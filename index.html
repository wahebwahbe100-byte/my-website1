<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GO.RASEED | تحويل سريع من كل مكان</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(900px 500px at 20% 20%, rgba(110,231,255,.18), transparent 55%),
                  radial-gradient(900px 500px at 80% 10%, rgba(167,139,250,.20), transparent 55%),
                  #0b1220;
      color:#eaf0ff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
    }
    .card{
      max-width: 900px;
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 22px 70px rgba(0,0,0,.45);
      text-align:center;
    }
    .hero{
      height: 360px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: url("hero.png") center/contain no-repeat;
      background-color: rgba(0,0,0,.15);
      animation: float 4s ease-in-out infinite;
    }
    h1{margin: 18px 0 8px; font-size: 28px}
    p{margin:0; color: rgba(234,240,255,.8)}
    .btn{
      display:inline-block;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6ee7ff, #a78bfa);
      color:#081022;
      text-decoration:none;
      font-weight:800;
    }
    @keyframes float{
      0%{transform: translateY(0)}
      50%{transform: translateY(-10px)}
      100%{transform: translateY(0)}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero" aria-label="GO.RASEED banner"></div>
    <h1>GO.RASEED</h1>
    <p>تحويل سريع من كل مكان — موقع رسمي</p>
    <a class="btn" href="#contact">تواصل معنا</a>
  </div>
</body>
</html>
