<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GO.RASEED | شحن إنترنت إلى سوريا</title>

<style>

body{
margin:0;
font-family:Arial;
background:#070b14;
color:white;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

header{
background:#050812;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.logo img{
width:40px;
border-radius:10px;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.hero img{
width:100%;
border-radius:20px;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:10px;
background:#6ee7ff;
color:black;
font-weight:bold;
text-decoration:none;
cursor:pointer;
border:none;
}

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:18px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.plan img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
margin-top:5px;
}

#payBox{
margin-top:20px;
display:none;
}

#community{
margin-top:40px;
padding:40px;
border-radius:20px;
background:url("./assets/world-map-bg.png") center/cover no-repeat;
position:relative;
}

#community::before{
content:"";
position:absolute;
inset:0;
background:rgba(5,8,18,.6);
}

#community *{
position:relative;
z-index:2;
}

footer{
margin-top:40px;
padding:20px;
border-top:1px solid rgba(255,255,255,.1);
text-align:center;
color:#b8c7ea;
}

@media(max-width:900px){

.hero{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>


<body>


<header>
<div class="wrap">

<div class="logo">
<img src="./assets/logo.png">
GO.RASEED
</div>

</div>
</header>


<div class="wrap">


<section class="hero">

<div>

<h1>شحن إنترنت إلى سوريا</h1>

<p>
اختر الباقة ثم املأ الطلب وبعد الدفع أرسل التفاصيل عبر واتساب.
</p>

</div>

<div>

<img src="./assets/hero.png">

</div>

</section>


<h2 style="margin-top:40px">الباقات</h2>


<div class="grid">

<div class="card plan">
<img src="./assets/plan18.png">
<h3>باقة 18€</h3>
<button class="btn" onclick="choosePlan(18)">اختيار</button>
</div>

<div class="card plan">
<img src="./assets/plan25.png">
<h3>باقة 25€</h3>
<button class="btn" onclick="choosePlan(25)">اختيار</button>
</div>

<div class="card plan">
<img src="./assets/plan35.png">
<h3>باقة 35€</h3>
<button class="btn" onclick="choosePlan(35)">اختيار</button>
</div>

</div>


<h2 style="margin-top:40px">طلب الشحن</h2>

<div class="card">

<label>الاسم</label>
<input id="name">

<label>رقم واتساب</label>
<input id="phone">

<label>المزود</label>
<select id="provider">
<option>Syriatel</option>
<option>MTN</option>
</select>

<label>الرقم داخل سوريا</label>
<input id="target">

<label>الباقة</label>
<input id="pack" readonly>

<label>ملاحظات</label>
<textarea id="msg"></textarea>


<div id="payBox">

<p>المبلغ المختار: <b id="price"></b></p>

<a id="payBtn" class="btn">ادفع الآن</a>

<button class="btn" onclick="sendWhats()">إرسال التفاصيل إلى واتساب</button>

</div>

</div>



<section id="community">

<h2>مجتمعنا على فيسبوك</h2>

<p>انضم إلى أكثر من 7000 عضو</p>

<a class="btn"
href="https://www.facebook.com/groups/1660921344375083/"
target="_blank">

الانضمام إلى المجموعة

</a>

</section>



<footer>

© 2026 GO.RASEED

</footer>


</div>


<script>

const payLinks={
18:"https://checkout.revolut.com/pay/5a922052-2414-46aa-b8ba-a8361c4f0c92",
25:"https://checkout.revolut.com/pay/7c510098-c099-47d8-977b-6da2901385ac",
35:"https://checkout.revolut.com/pay/8f42d09d-b794-4ac0-81e1-9be5aa6189fc"
}

function choosePlan(price){

document.getElementById("pack").value="باقة "+price+"€"
document.getElementById("price").innerText=price+"€"

document.getElementById("payBtn").href=payLinks[price]

document.getElementById("payBox").style.display="block"

}


function sendWhats(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const provider=document.getElementById("provider").value
const target=document.getElementById("target").value
const pack=document.getElementById("pack").value
const notes=document.getElementById("msg").value

const text=

`طلب GO.RASEED

الاسم: ${name}
واتساب: ${phone}
المزود: ${provider}
الرقم: ${target}
الباقة: ${pack}
ملاحظات: ${notes}`

const url="https://wa.me/4915213873166?text="+encodeURIComponent(text)

window.open(url)

}

</script>


</body>
</html>
